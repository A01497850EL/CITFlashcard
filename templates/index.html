{% extends "base.html" %}

{% block content %}

<!-- Hero section -->
<section class="hero-section">
    <h1>Flashy</h1>
    <p>Create and Study Your Flashcards</p>
    
    <div class="hero-buttons">
        <a href="{{ url_for('create_deck') }}" class="btn-create">Create Deck</a>
        <a href="{{ url_for('show_decks') }}" class="btn-view">View Decks</a>
    </div>
</section> 

<!-- Recent Deck list -->
<section class="recent-decks">
    <h2>Recent Decks</h2>
    <div class="deck-grid">
        {% for deck in decks %}
        <div class="deck-card">
            <h3>{{ deck.name }}</h3>
            <a href="{{ url_for('view_deck', deck_id=deck.id) }}" class="btn-secondary">Open</a>
        </div>
        {% else %}
        <p>No decks yet — create one above.</p>
        {% endfor %}
    </div>
</section>
{% endblock %}
