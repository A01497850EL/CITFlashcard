{% extends "base.html" %}

{% block content %}
<h1>Your Decks</h1>

<!-- Create deck form -->
<form action="/deck/create" method="POST">
    <input type="text" name="name" placeholder="Deck name" required>
    <button type="submit">+ New Deck</button>
</form>

<!-- Deck list -->
{% for deck in decks %}
    <a href="/deck/{{ deck.id }}">
        <div class="deck-card">
            <h2>{{ deck.name }}</h2>
        </div>
    </a>
{% else %}
    <p>No decks yet — create one above.</p>
{% endfor %}

{% endblock %}
