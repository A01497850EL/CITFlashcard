# Install Python dependencies, run tests and lint with a single version of Python
name: Test Python Application

on:
  push:
    branches: ["dev"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.13
        uses: actions/setup-python@v3
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: |
          pip install pytest flask peewee fsrs
      - name: Test with pytest
        run: |
          pytest -v
  create-pull-request:
    needs: build
    runs-on: ubuntu-latest
    if: ${{ success() }}
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Create Pull Request
        run: gh pr create -B dev -H ${{ github.ref_name }} --title "Merge ${{ github.ref_name }} into dev" --body "Automatic PR from Github Actions"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
